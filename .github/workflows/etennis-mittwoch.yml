name: eTennis Mittwoch-Buchung

on:
  schedule:
    # Zwei Buchungsfenster pro Woche - je 8 Tage vor Slot-Start (Dienstag statt
    # Mittwoch): 16:00 Uhr (fuer den 16-18 Uhr Slot) und 18:00 Uhr (fuer den
    # 18-20 Uhr Slot). GitHub-Cron ist bei genauem Timing unzuverlaessig
    # (Verzoegerungen von mehreren Minuten bis >1h beobachtet); Actions-Schedules
    # laufen aber max. alle 5 Minuten, daher feste 5-Minuten-Schritte X:55/X:00/
    # X:05/X:10 lokaler Zeit statt Minuten-Bereiche. Jeder Lauf versucht ohnehin
    # beide Slots (siehe Skript), die "falsche" Saison bzw. das noch nicht
    # relevante Fenster laeuft harmlos ins Leere (nores/not_bookable). Kein
    # automatisches DST-Handling -> separate Eintraege fuer Winter-/Sommerzeit.
    - cron: "55 14 * * 2"        # Winterzeit (CET, UTC+1): 15:55 CET
    - cron: "0,5,10 15 * * 2"    # Winterzeit (CET, UTC+1): 16:00/05/10 CET
    - cron: "55 16 * * 2"        # Winterzeit (CET, UTC+1): 17:55 CET
    - cron: "0,5,10 17 * * 2"    # Winterzeit (CET, UTC+1): 18:00/05/10 CET
    - cron: "55 13 * * 2"        # Sommerzeit (CEST, UTC+2): 15:55 CEST
    - cron: "0,5,10 14 * * 2"    # Sommerzeit (CEST, UTC+2): 16:00/05/10 CEST
    - cron: "55 15 * * 2"        # Sommerzeit (CEST, UTC+2): 17:55 CEST
    - cron: "0,5,10 16 * * 2"    # Sommerzeit (CEST, UTC+2): 18:00/05/10 CEST
  workflow_dispatch: {}     # manueller Testlauf ueber die GitHub-UI

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Buchung ausfuehren
        env:
          ETENNIS_SITE_ROOT: ${{ secrets.ETENNIS_SITE_ROOT }}
          ETENNIS_CLUB_ID: ${{ secrets.ETENNIS_CLUB_ID }}
          ETENNIS_USERNAME: ${{ secrets.ETENNIS_USERNAME }}
          ETENNIS_PASSWORD: ${{ secrets.ETENNIS_PASSWORD }}
        run: python etennis_mittwoch.py

      - name: Log als Artifact sichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etennis-mittwoch-log
          path: etennis_mittwoch.log
          retention-days: 30
