name: eTennis Mittwoch-Buchung

on:
  schedule:
    # Buchungsfenster oeffnet exakt 8 Tage vor dem Startzeitpunkt, also Dienstag
    # 18:00 Uhr (8 Tage vor Mittwoch 18:00 Uhr). GitHub-Cron ist bei genauem Timing
    # unzuverlaessig (Verzoegerungen von mehreren Minuten bis >1h beobachtet), daher
    # minuetlich von 17:55 bis 18:10 Uhr lokaler Zeit feuern, um trotz Verzoegerung
    # eine Chance auf den Slot zu haben. Kein automatisches DST-Handling -> separate
    # Eintraege fuer Winter-/Sommerzeit (die "falsche" Saison laeuft ins Leere, da
    # der Slot dann schon belegt/noch nicht offen ist - harmlos).
    - cron: "55-59 16 * * 2"   # Winterzeit (CET, UTC+1): 17:55-17:59 CET
    - cron: "0-10 17 * * 2"    # Winterzeit (CET, UTC+1): 18:00-18:10 CET
    - cron: "55-59 15 * * 2"   # Sommerzeit (CEST, UTC+2): 17:55-17:59 CEST
    - cron: "0-10 16 * * 2"    # Sommerzeit (CEST, UTC+2): 18:00-18:10 CEST
  workflow_dispatch: {}     # manueller Testlauf ueber die GitHub-UI

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Buchung ausfuehren
        env:
          ETENNIS_SITE_ROOT: ${{ secrets.ETENNIS_SITE_ROOT }}
          ETENNIS_CLUB_ID: ${{ secrets.ETENNIS_CLUB_ID }}
          ETENNIS_USERNAME: ${{ secrets.ETENNIS_USERNAME }}
          ETENNIS_PASSWORD: ${{ secrets.ETENNIS_PASSWORD }}
        run: python etennis_mittwoch.py

      - name: Log als Artifact sichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etennis-mittwoch-log
          path: etennis_mittwoch.log
          retention-days: 30
